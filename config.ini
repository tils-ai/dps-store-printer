[printer]
; Windows 설정 > 프린터에서 정확한 이름 확인
name = SLK TS200
dpi = 203
; 렌더링 해상도 (높을수록 선명, 기본 300)
render_dpi = 300

[folder]
; watcher 전용 설정
; 비워두면 exe와 같은 폴더 기준으로 자동 생성
; 경로를 지정하면 해당 폴더를 사용 (예: D:\LabelPrint\watch)
watch =
done =
error =

[api]
; agent 전용 설정
; 테넌트 이름 (store.dpl.shop의 스토어 식별자)
tenant =
; API 키 (인증 완료 시 자동 기록, 수동 편집 불필요)
api_key =
; 서버 주소
base_url = https://store.dpl.shop
; 풀링 간격 (초, 유휴 시 자동 백오프)
poll_interval = 5
