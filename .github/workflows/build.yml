name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install poppler
        id: poppler
        run: |
          $url = "https://github.com/osdn-mirror/poppler/releases/download/poppler-24.08.0-0/poppler-24.08.0_Library.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler-install
          $popplerBin = (Get-ChildItem -Path poppler-install -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1).DirectoryName
          if (-not $popplerBin) {
            echo "=== directory structure ==="
            Get-ChildItem -Path poppler-install -Recurse | Select-Object FullName
            Write-Error "pdftoppm.exe not found"
            exit 1
          }
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT
          echo "Poppler bin: $popplerBin"
          ls $popplerBin
        shell: pwsh

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --name label-printer-watcher --console --hidden-import win32print --hidden-import win32ui --hidden-import win32api --add-data "${{ steps.poppler.outputs.bin }};poppler" main.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          files: dist/label-printer-watcher.exe
