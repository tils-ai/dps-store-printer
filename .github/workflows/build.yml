name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install poppler via MSYS2
        id: poppler
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-poppler
          $popplerBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$popplerBin\pdftoppm.exe")) {
            Write-Error "pdftoppm.exe not found in $popplerBin"
            exit 1
          }
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT
          echo "Poppler bin: $popplerBin"
        shell: pwsh

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --name label-printer-watcher --console --hidden-import win32print --hidden-import win32ui --hidden-import win32api --add-data "${{ steps.poppler.outputs.bin }};poppler" main.py

      - name: Prepare release files
        run: |
          copy config.ini dist\config.ini
          copy 사용설명서.txt dist\사용설명서.txt
        shell: cmd

      - name: Upload to Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          files: |
            dist/label-printer-watcher.exe
            dist/config.ini
            dist/사용설명서.txt
